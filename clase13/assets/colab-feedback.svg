<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 375"><title>Notebook con código de feedback</title><rect width="1200" height="375" rx="32" fill="#0a1518"/><rect x="90" y="50" width="1020" height="275" rx="28" fill="#101f23" stroke="#7b6530" stroke-width="3"/><rect x="90" y="50" width="1020" height="55" rx="28" fill="#24231a"/><circle cx="130" cy="78" r="8" fill="#ff7c79"/><circle cx="160" cy="78" r="8" fill="#f3c85b"/><circle cx="190" cy="78" r="8" fill="#55d68b"/><g font-family="ui-monospace,monospace" font-size="21"><text x="145" y="155" fill="#54c9d8">def</text><text x="195" y="155" fill="#f3f7f5">ajustar_confianza(valor, feedback):</text><text x="185" y="200" fill="#a9bdba">ajuste = {"positivo": 5, "negativo": -7}</text><text x="185" y="245" fill="#55d68b">return max(0, min(100, valor + ajuste))</text></g><rect x="860" y="135" width="170" height="110" rx="20" fill="#17372a"/><text x="945" y="205" fill="#55d68b" font-family="system-ui,sans-serif" font-size="48" font-weight="900" text-anchor="middle">70→75</text></svg>
